name: Check Translation Strings

# See docs at `./locale/README.md`.

on: workflow_call


jobs:
  locale:
    runs-on: ubuntu-24.04
    steps:

    ## Setup

    - uses: actions/checkout@v6

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with: { cache-suffix: 'dev_requirements' }

    - name: Update Debian package lists
      run: sudo DEBIAN_FRONTEND=noninteractive apt-get -y update

    - name: Install Debian dependencies
      run: sudo DEBIAN_FRONTEND=noninteractive apt-get -y install gdal-bin gettext libproj-dev postgresql-client ffmpeg gcc libc-dev build-essential

    - name: Install Python dependencies
      run: uv pip sync --system dependencies/pip/dev_requirements.txt

    ## Testing

    - name: Extract translatable strings from Python code.
      run: |
        ORIGINAL_LINE="$(cat locale/en/LC_MESSAGES/django.po | grep POT-Creation-Date)"
        python manage.py makemessages --locale en
        sed -i "s|\"POT-Creation-Date.*|${ORIGINAL_LINE//\\/\\\\}|" locale/en/LC_MESSAGES/django.po

    - name: Extract translatable strings from Javascript/Typescript code.
      run: |
        ORIGINAL_LINE="$(cat locale/en/LC_MESSAGES/djangojs.po | grep POT-Creation-Date)"
        python manage.py makemessages --locale en --domain djangojs
        sed -i "s|\"POT-Creation-Date.*|${ORIGINAL_LINE//\\/\\\\}|" locale/en/LC_MESSAGES/djangojs.po

    - name: Abort if there are uncommitted translatable string changes.
      run: |
        git diff --stat
        echo 'see `./locale/README.md`. TL;DR: if this errors, run `./scripts/generate_locale.sh` locally.'
        git diff-index --exit-code HEAD

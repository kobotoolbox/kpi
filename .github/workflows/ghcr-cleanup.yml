name: GHCR image cleanup

on:
  push:
    branches: [ghcr-retention-policy]
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  cleanup-old-images:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.KOBO_BOT_APP_ID }}
          private-key: ${{ secrets.KOBO_BOT_PRIVATE_KEY }}
          owner: kobotoolbox
          repositories: "kpi"

      - uses: snok/container-retention-policy@v3.0.0
        with:
          account: kobotoolbox
          token: ${{ steps.app-token.outputs.token }}
          image-names: kpi
          image-tags: "!main !public-beta !feature-*"
          cut-off: 90d
          dry-run: true

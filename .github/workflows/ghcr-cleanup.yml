name: GHCR image cleanup

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00 UTC
  workflow_dispatch:

jobs:
  cleanup-old-images:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: snok/container-retention-policy@v3.0.1
        with:
          account: kobotoolbox
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: kpi
          cut-off: 90d
          keep-n-most-recent: 1
          dry-run: false
